apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lineage-ota-server.fullname" . }}
  labels:
    {{- include "lineage-ota-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "lineage-ota-server.labels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lineage-ota-server.labels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: lineage-ota-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: BUILDS_DIR
              value: /builds
            - name: BASE_URL
              value: {{ .Values.baseUrl | quote }}
            - name: RETAIN_BUILDS
              value: {{ .Values.retainBuilds | quote }}
            - name: UPLOAD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "lineage-ota-server.secretName" . }}
                  key: {{ .Values.existingSecretKey }}
          volumeMounts:
            - name: builds
              mountPath: /builds
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: builds
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (include "lineage-ota-server.fullname" .) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
